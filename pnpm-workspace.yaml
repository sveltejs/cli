minimumReleaseAge: 1440
minimumReleaseAgeExclude:
  - '@sveltejs/*'
  - svelte
  - esrap
  - devalue
  - zimmerframe
  - prettier-plugin-svelte
  - svelte-check
  - esm-env
blockExoticSubdeps: true

packages:
  - 'packages/*'
  - '!.test-tmp/**'
  - '!**/.test-output/**'

onlyBuiltDependencies:
  - esbuild
